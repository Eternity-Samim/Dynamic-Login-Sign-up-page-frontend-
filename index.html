<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <title>Log in page</title>
</head>
<body class="background">
	<div class="login">
	  <label for="email" id="emailLabel" class="inputLabel">Email:</label>
	  <input type="email" class="inputBar" id="email">
	  <label for="phoneNo" id="phoneNoLabel" class="inputLabel">Phone Number:</label>
	  <input type="Number" class="inputBar" id="phoneNo">
	  <label for="password" id="passwordLabel" class="inputLabel">Password:</label>
	  <input type="password" class="inputBar" id="password">
    <button class="subBtn">Submit</button>
	</div>
	
		<div class="signUp">
	  <label for="email2" id="emailLabel2" class="inputLabel2">Email:</label>
	  <input type="email" class="inputBar2" id="email2">
	  <label for="phoneNo2" id="phoneNoLabel2" class="inputLabel2">Phone Number:</label>
	  <input type="Number" class="inputBar2" id="phoneNo2">
	  <label for="crtpassword" id="crtpasswordLabel2" class="inputLabel2">Create Password:</label>
	  <input type="password" class="inputBar2" id="crtpassword">
	  <label for="cnfpassword" id="cnfpasswordLabel2" class="inputLabel2">Confirm Password:</label>
	  <input type="password" class="inputBar2" id="cnfpassword">
    <button class="subBtn2">Submit</button>
    
	</div>
	<button class="change1" id="change">Sign Up?</button>
  <script src="js/index.js"></script>
</body>
</html>
